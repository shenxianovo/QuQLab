# HTTP -> HTTPS
server {
    listen 80;
    server_name shenxianovo.com auth.shenxianovo.com;

    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name shenxianovo.com;

    root /var/www/quqlab;
    index index.html;

    # SSL
    ssl_certificate /etc/letsencrypt/live/shenxianovo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shenxianovo.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /heartbeat/api/ {
        proxy_pass http://127.0.0.1:5023/api/;
    }

    location /heartbeat/ {
        alias /var/www/heartbeat/;
        try_files $uri $uri/ /heartbeat/index.html;
    }

    location / {
        try_files $uri $uri/ =404;
    }

}

# AuthService
server {
    listen 443 ssl;
    server_name auth.shenxianovo.com;

    ssl_certificate /etc/letsencrypt/live/shenxianovo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shenxianovo.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:5252;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}